<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Inter, -apple-system, sans-serif" font-size="12">
  <title>SpoolBuddy Control Station — Front Panel Layout</title>

  <!-- Background / Enclosure -->
  <rect width="800" height="400" fill="#1c1c1c" rx="16"/>
  <rect x="8" y="8" width="784" height="384" fill="none" stroke="#333" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="400" y="388" text-anchor="middle" fill="#555" font-size="9">SpoolBuddy Control Station — Front Panel Layout</text>

  <!-- ═══════════ OLED Display Area ═══════════ -->
  <!-- Display bezel -->
  <rect x="40" y="60" width="440" height="280" fill="#111" stroke="#444" stroke-width="2" rx="8"/>
  <!-- Active display area (128x64 pixels scaled up) -->
  <rect x="60" y="80" width="400" height="240" fill="#000" stroke="#222" stroke-width="1" rx="4"/>
  
  <!-- Display label -->
  <text x="260" y="50" text-anchor="middle" fill="#666" font-size="10">2.42" SSD1309 OLED — 128×64px</text>

  <!-- Simulated screen content -->
  <!-- Status bar (top 8px = 30px scaled) -->
  <rect x="60" y="80" width="400" height="30" fill="#0a0a0a"/>
  <text x="72" y="100" fill="#4ade80" font-size="11">WiFi ✓</text>
  <text x="130" y="100" fill="#60a5fa" font-size="11">NFC ✓</text>
  <text x="184" y="100" fill="#fbbf24" font-size="11">832g</text>
  <text x="440" y="100" fill="#888" font-size="10" text-anchor="end">SpoolBuddy</text>

  <!-- Main content area -->
  <text x="72" y="145" fill="#e0e0e0" font-size="16" font-weight="bold">Prusament PLA</text>
  <text x="72" y="172" fill="#aaa" font-size="13">Galaxy Black — 832g</text>
  <text x="72" y="200" fill="#888" font-size="11">Printer: Bambu X1C #3</text>
  <text x="72" y="228" fill="#888" font-size="11">Spool ID: SP-00A4</text>

  <!-- Menu hint at bottom -->
  <rect x="60" y="290" width="400" height="30" fill="#0a0a0a"/>
  <text x="72" y="310" fill="#666" font-size="10">↻ Scroll menus</text>
  <text x="280" y="310" fill="#4ade80" font-size="10">● SELECT</text>
  <text x="380" y="310" fill="#f87171" font-size="10">◄ BACK</text>

  <!-- ═══════════ Controls Area (right side) ═══════════ -->
  
  <!-- Rotary Encoder -->
  <circle cx="600" cy="170" r="45" fill="#222" stroke="#555" stroke-width="2"/>
  <circle cx="600" cy="170" r="35" fill="#2a2a2a" stroke="#666" stroke-width="1.5"/>
  <circle cx="600" cy="170" r="8" fill="#444" stroke="#777" stroke-width="1"/>
  <!-- Knurling marks -->
  <circle cx="600" cy="170" r="30" fill="none" stroke="#3a3a3a" stroke-width="0.5" stroke-dasharray="3,3"/>
  <!-- Encoder label -->
  <text x="600" y="235" text-anchor="middle" fill="#888" font-size="10">ENCODER</text>
  <text x="600" y="248" text-anchor="middle" fill="#555" font-size="9">Turn = Scroll | Press = Select</text>

  <!-- Direction indicators around encoder -->
  <text x="555" y="175" fill="#444" font-size="14">◄</text>
  <text x="637" y="175" fill="#444" font-size="14">►</text>

  <!-- SELECT Button -->
  <rect x="695" y="100" width="70" height="40" fill="#1a3a1a" stroke="#4ade80" stroke-width="2" rx="8"/>
  <text x="730" y="125" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">SELECT</text>

  <!-- BACK Button -->
  <rect x="695" y="200" width="70" height="40" fill="#3a1a1a" stroke="#f87171" stroke-width="2" rx="8"/>
  <text x="730" y="225" text-anchor="middle" fill="#f87171" font-size="11" font-weight="bold">BACK</text>

  <!-- RGB Status LED -->
  <circle cx="730" cy="290" r="8" fill="#4ade80" stroke="#333" stroke-width="1"/>
  <circle cx="730" cy="290" r="4" fill="#6fff6f" opacity="0.6"/>
  <text x="730" y="310" text-anchor="middle" fill="#555" font-size="9">STATUS</text>

  <!-- Buzzer (internal, shown as icon) -->
  <text x="730" y="345" text-anchor="middle" fill="#444" font-size="16">🔊</text>
  <text x="730" y="360" text-anchor="middle" fill="#444" font-size="8">buzzer</text>

  <!-- ═══════════ Dimensions / annotations ═══════════ -->
  <!-- Overall width annotation -->
  <line x1="40" y1="25" x2="765" y2="25" stroke="#555" stroke-width="0.5"/>
  <line x1="40" y1="20" x2="40" y2="30" stroke="#555" stroke-width="0.5"/>
  <line x1="765" y1="20" x2="765" y2="30" stroke="#555" stroke-width="0.5"/>
  <text x="400" y="22" text-anchor="middle" fill="#555" font-size="9">~150mm panel width</text>

  <!-- Divider between display and controls -->
  <line x1="520" y1="70" x2="520" y2="340" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
</svg>
