<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="Consolas, monospace" font-size="11">
  <title>SpoolBuddy ESP32-S3 Control Station — Wiring Diagram v2</title>

  <!-- Background -->
  <rect width="1400" height="900" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="700" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">SpoolBuddy ESP32-S3 Control Station — Wiring Diagram</text>
  <text x="700" y="50" text-anchor="middle" fill="#888" font-size="10">ESP32-S3-DevKitC-1 + PN5180 (HSPI) + SSD1309 2.42" OLED (FSPI) + HX711 + Encoder + Buttons</text>

  <!-- ═══════════════ ESP32-S3 (center) ═══════════════ -->
  <rect x="530" y="80" width="240" height="620" fill="#2d2d44" stroke="#6c63ff" stroke-width="2" rx="6"/>
  <text x="650" y="105" text-anchor="middle" fill="#6c63ff" font-size="13" font-weight="bold">ESP32-S3-DevKitC-1</text>
  <text x="650" y="120" text-anchor="middle" fill="#555" font-size="9">USB-C (bottom)</text>

  <!-- Left-side pins -->
  <text x="545" y="155" fill="#ccc" font-size="10">3V3</text>
  <text x="545" y="180" fill="#ccc" font-size="10">GND</text>
  <text x="545" y="215" fill="#ccc" font-size="10">G1  (HX711 DOUT)</text>
  <text x="545" y="240" fill="#ccc" font-size="10">G2  (HX711 SCK)</text>
  <text x="545" y="275" fill="#ccc" font-size="10">G3  (OLED DC)</text>
  <text x="545" y="300" fill="#ccc" font-size="10">G4  (OLED RST)</text>
  <text x="545" y="325" fill="#ccc" font-size="10">G5  (OLED SCK)</text>
  <text x="545" y="350" fill="#ccc" font-size="10">G6  (OLED MOSI)</text>
  <text x="545" y="375" fill="#ccc" font-size="10">G7  (OLED CS)</text>
  <text x="545" y="410" fill="#ccc" font-size="10">G8  (NFC RST)</text>
  <text x="545" y="435" fill="#ccc" font-size="10">G9  (NFC BUSY)</text>
  <text x="545" y="460" fill="#ccc" font-size="10">G10 (NFC NSS)</text>
  <text x="545" y="485" fill="#ccc" font-size="10">G11 (NFC MOSI)</text>
  <text x="545" y="510" fill="#ccc" font-size="10">G12 (NFC SCK)</text>
  <text x="545" y="535" fill="#ccc" font-size="10">G13 (NFC MISO)</text>

  <!-- Right-side pins -->
  <text x="660" y="215" fill="#ccc" font-size="10">G14 (ENC CLK)</text>
  <text x="660" y="240" fill="#ccc" font-size="10">G15 (ENC DT)</text>
  <text x="660" y="265" fill="#ccc" font-size="10">G16 (ENC SW)</text>
  <text x="660" y="300" fill="#ccc" font-size="10">G17 (BTN SELECT)</text>
  <text x="660" y="325" fill="#ccc" font-size="10">G18 (BTN BACK)</text>
  <text x="660" y="370" fill="#ccc" font-size="10">G21 (BUZZER)</text>
  <text x="660" y="410" fill="#ccc" font-size="10">G48 (RGB LED)</text>

  <!-- ═══════════════ PN5180 NFC Reader (left) ═══════════════ -->
  <rect x="40" y="340" width="200" height="300" fill="#1e3a2e" stroke="#22c55e" stroke-width="2" rx="6"/>
  <text x="140" y="365" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold">PN5180 NFC Reader</text>
  <text x="140" y="382" text-anchor="middle" fill="#4a8" font-size="9">HSPI (SPI3)</text>

  <text x="55" y="410" fill="#aaa" font-size="10">3V3  ← 3V3</text>
  <text x="55" y="430" fill="#aaa" font-size="10">5V   ← Ext 5V Supply</text>
  <text x="55" y="450" fill="#aaa" font-size="10">GND  ← GND (shared)</text>
  <text x="55" y="480" fill="#fbbf24" font-size="10">SCK  ← G12</text>
  <text x="55" y="500" fill="#60a5fa" font-size="10">MISO → G13</text>
  <text x="55" y="520" fill="#4ade80" font-size="10">MOSI ← G11</text>
  <text x="55" y="540" fill="#fb923c" font-size="10">NSS  ← G10</text>
  <text x="55" y="560" fill="#e5e5e5" font-size="10">BUSY → G9</text>
  <text x="55" y="580" fill="#a78bfa" font-size="10">RST  ← G8</text>

  <!-- NFC Wires -->
  <line x1="240" y1="478" x2="530" y2="510" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="240" y1="498" x2="530" y2="535" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="240" y1="518" x2="530" y2="485" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="240" y1="538" x2="530" y2="460" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="240" y1="558" x2="530" y2="435" stroke="#e5e5e5" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="240" y1="578" x2="530" y2="410" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ═══════════════ 2.42" SSD1309 OLED (upper left) ═══════════════ -->
  <rect x="40" y="80" width="200" height="230" fill="#1e2a3e" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="140" y="105" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="bold">2.42" SSD1309 OLED</text>
  <text x="140" y="122" text-anchor="middle" fill="#6090c0" font-size="9">FSPI (SPI2) — 128×64</text>

  <text x="55" y="150" fill="#aaa" font-size="10">GND  ← GND</text>
  <text x="55" y="170" fill="#aaa" font-size="10">VCC  ← 3V3</text>
  <text x="55" y="198" fill="#fbbf24" font-size="10">SCK  ← G5</text>
  <text x="55" y="218" fill="#4ade80" font-size="10">SDA  ← G6  (MOSI)</text>
  <text x="55" y="238" fill="#a78bfa" font-size="10">RES  ← G4</text>
  <text x="55" y="258" fill="#f472b6" font-size="10">DC   ← G3</text>
  <text x="55" y="278" fill="#fb923c" font-size="10">CS   ← G7</text>

  <!-- OLED Wires -->
  <line x1="240" y1="196" x2="530" y2="325" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="240" y1="216" x2="530" y2="350" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="240" y1="236" x2="530" y2="300" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="240" y1="256" x2="530" y2="275" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="240" y1="276" x2="530" y2="375" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ═══════════════ HX711 + Load Cell (bottom left) ═══════════════ -->
  <rect x="40" y="670" width="200" height="170" fill="#2e1e1e" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="140" y="695" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">HX711 + Load Cell</text>
  <text x="140" y="712" text-anchor="middle" fill="#a66" font-size="9">Bit-bang 2-wire</text>

  <text x="55" y="740" fill="#aaa" font-size="10">VCC  ← 3V3</text>
  <text x="55" y="760" fill="#aaa" font-size="10">GND  ← GND</text>
  <text x="55" y="788" fill="#e5e5e5" font-size="10">DOUT → G1</text>
  <text x="55" y="808" fill="#fbbf24" font-size="10">SCK  ← G2</text>

  <!-- HX711 Wires -->
  <line x1="240" y1="786" x2="530" y2="215" stroke="#e5e5e5" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="240" y1="806" x2="530" y2="240" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ═══════════════ Rotary Encoder (right) ═══════════════ -->
  <rect x="1050" y="100" width="200" height="200" fill="#2e2e1e" stroke="#eab308" stroke-width="2" rx="6"/>
  <text x="1150" y="125" text-anchor="middle" fill="#eab308" font-size="12" font-weight="bold">Rotary Encoder</text>
  <text x="1150" y="142" text-anchor="middle" fill="#a89030" font-size="9">KY-040 or similar</text>

  <text x="1065" y="175" fill="#4ade80" font-size="10">CLK (A) → G14</text>
  <text x="1065" y="200" fill="#60a5fa" font-size="10">DT  (B) → G15</text>
  <text x="1065" y="225" fill="#fb923c" font-size="10">SW      → G16</text>
  <text x="1065" y="255" fill="#aaa" font-size="10">+   ← 3V3</text>
  <text x="1065" y="275" fill="#aaa" font-size="10">GND ← GND</text>

  <!-- Encoder Wires -->
  <line x1="1050" y1="173" x2="770" y2="215" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="1050" y1="198" x2="770" y2="240" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="1050" y1="223" x2="770" y2="265" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ═══════════════ Buttons (right middle) ═══════════════ -->
  <rect x="1050" y="340" width="200" height="160" fill="#1e2e2e" stroke="#06b6d4" stroke-width="2" rx="6"/>
  <text x="1150" y="365" text-anchor="middle" fill="#06b6d4" font-size="12" font-weight="bold">Control Buttons</text>
  <text x="1150" y="382" text-anchor="middle" fill="#068" font-size="9">Active LOW + internal pull-up</text>

  <text x="1065" y="415" fill="#4ade80" font-size="10">SELECT → G17</text>
  <text x="1065" y="440" fill="#f87171" font-size="10">BACK   → G18</text>
  <text x="1065" y="470" fill="#aaa" font-size="10">GND    ← GND (both buttons)</text>

  <!-- Button Wires -->
  <line x1="1050" y1="413" x2="770" y2="300" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="1050" y1="438" x2="770" y2="325" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ═══════════════ Buzzer (right lower) ═══════════════ -->
  <rect x="1050" y="540" width="200" height="120" fill="#2e1e2e" stroke="#a855f7" stroke-width="2" rx="6"/>
  <text x="1150" y="565" text-anchor="middle" fill="#a855f7" font-size="12" font-weight="bold">Piezo Buzzer</text>
  <text x="1150" y="582" text-anchor="middle" fill="#86c" font-size="9">Optional — scan feedback</text>

  <text x="1065" y="615" fill="#a78bfa" font-size="10">+   ← G21</text>
  <text x="1065" y="640" fill="#aaa" font-size="10">GND ← GND</text>

  <!-- Buzzer Wire -->
  <line x1="1050" y1="613" x2="770" y2="370" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ═══════════════ External 5V Supply (bottom) ═══════════════ -->
  <rect x="40" y="850" width="200" height="40" fill="#333" stroke="#f97316" stroke-width="1" rx="4"/>
  <text x="140" y="875" text-anchor="middle" fill="#f97316" font-size="10">External 5V Supply → PN5180 TVDD</text>

  <!-- ═══════════════ Legend ═══════════════ -->
  <rect x="1050" y="710" width="310" height="170" fill="#222" stroke="#555" stroke-width="1" rx="4"/>
  <text x="1065" y="735" fill="#ccc" font-size="11" font-weight="bold">Pin Summary</text>
  <text x="1065" y="758" fill="#888" font-size="9">G1-G2    HX711 (load cell)</text>
  <text x="1065" y="775" fill="#888" font-size="9">G3-G7    SSD1309 OLED (FSPI/SPI2)</text>
  <text x="1065" y="792" fill="#888" font-size="9">G8-G13   PN5180 NFC (HSPI/SPI3)</text>
  <text x="1065" y="809" fill="#888" font-size="9">G14-G16  Rotary Encoder</text>
  <text x="1065" y="826" fill="#888" font-size="9">G17-G18  SELECT / BACK buttons</text>
  <text x="1065" y="843" fill="#888" font-size="9">G21      Buzzer</text>
  <text x="1065" y="860" fill="#888" font-size="9">G48      RGB LED (built-in)</text>
  <text x="1065" y="877" fill="#555" font-size="9">Free: G0, G19, G20, G38-42, G47</text>
</svg>
