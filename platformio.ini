; SpoolBuddy v3 — ESP32-S3 + 4" TFT + PN5180 NFC + HX711

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc1-n16r8
framework = arduino
board_build.mcu = esp32s3

; Hardware includes 8MB PSRAM, but this firmware does not allocate into it.
; Use the N16R8 board definition so flash sizing and OTA partitions match.

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0

upload_port = /dev/cu.usbmodem1101
upload_speed = 921600
monitor_speed = 115200

lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    bogde/HX711@^0.7.5
    bblanchon/ArduinoJson@^7.0.0
    adafruit/Adafruit NeoPixel@^1.12.0
    atrappmann/PN5180 Library@^1.5
